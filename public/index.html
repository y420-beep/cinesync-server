<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>CineSync</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0f;color:#fff;height:100%;overflow:hidden;touch-action:manipulation}
.hidden{display:none!important}

#connect{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:linear-gradient(180deg,#0a0a0f 0%,#12121f 100%);z-index:1000}
.logo{font-size:52px;font-weight:800;background:linear-gradient(135deg,#e50914,#ff4757);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px;letter-spacing:-1px}
.sub{color:#666;font-size:15px;margin-bottom:48px;text-align:center}
.inp{width:100%;max-width:340px;padding:18px 20px;border:1.5px solid #222;border-radius:16px;background:#16161f;color:#fff;font-size:17px;margin-bottom:12px;outline:none;-webkit-appearance:none;user-select:text;-webkit-user-select:text;transition:border-color .2s}
.inp:focus{border-color:#e50914}
.inp::placeholder{color:#444}
.btn{width:100%;max-width:340px;padding:18px;border:none;border-radius:16px;font-size:17px;font-weight:600;cursor:pointer;-webkit-appearance:none;touch-action:manipulation;transition:transform .1s,opacity .2s}
.btn:active{transform:scale(.97)}
.btn-red{background:#e50914;color:#fff}
.btn-red:active{background:#c20811}
.btn-dark{background:#1a1a2e;color:#fff;margin-top:10px;border:1px solid #222}
.btn-dark:active{background:#252536}
.or{color:#333;margin:14px 0;font-size:14px}
.status{margin-top:20px;padding:14px 20px;border-radius:14px;font-size:14px;max-width:340px;width:100%;text-align:center;transition:all .3s;opacity:0;transform:translateY(-10px)}
.status.show{opacity:1;transform:translateY(0)}
.status-ok{background:rgba(0,255,136,.08);color:#00ff88;border:1px solid rgba(0,255,136,.15)}
.status-wait{background:rgba(0,212,255,.08);color:#00d4ff;border:1px solid rgba(0,212,255,.15)}
.status-err{background:rgba(229,9,20,.08);color:#e50914;border:1px solid rgba(229,9,20,.15)}

#main{position:fixed;inset:0;display:flex;flex-direction:column;background:#000;z-index:100}

#vbox{flex:1;position:relative;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden}
video{width:100%;height:100%;object-fit:contain;background:#000}
#ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#555;pointer-events:none;z-index:5}
#ph .ic{font-size:56px;margin-bottom:14px;opacity:.6}
#ph div{font-size:15px;color:#444}

#badge{position:absolute;top:max(12px,env(safe-area-inset-top));left:12px;display:flex;align-items:center;gap:8px;padding:8px 16px;background:rgba(0,0,0,.7);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:20px;font-size:12px;z-index:50;transition:opacity .3s}
#badge .dot{width:7px;height:7px;border-radius:50%;background:#00ff88;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

#peers{position:absolute;top:max(56px,env(safe-area-inset-top)+40px);left:12px;display:flex;flex-direction:column;gap:6px;z-index:50;transition:opacity .3s;pointer-events:none}
.peer{display:flex;align-items:center;gap:8px;padding:7px 14px;background:rgba(0,0,0,.7);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:18px;font-size:12px;transition:.15s}
.peer.talk{background:rgba(0,255,136,.15);border:1px solid rgba(0,255,136,.25)}
.pv{width:32px;height:3px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden}
.pvf{height:100%;background:#00ff88;width:0%;transition:width .1s}

.panel{position:fixed;left:16px;right:16px;background:rgba(14,14,22,.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);padding:20px;border-radius:20px;z-index:200;border:1px solid rgba(255,255,255,.06);box-shadow:0 25px 50px rgba(0,0,0,.6);transition:transform .35s cubic-bezier(.32,.72,0,1),opacity .25s;opacity:0;pointer-events:none}
.panel.active{opacity:1;pointer-events:auto}

#url-panel{bottom:max(130px,env(safe-area-inset-bottom)+110px);transform:translateY(20px) scale(.96)}
#url-panel.active{transform:translateY(0) scale(1)}
#url-panel .row{display:flex;gap:10px;align-items:center}
#url-panel input{flex:1;margin:0;padding:14px 16px;border:1.5px solid #222;border-radius:14px;background:#16161f;color:#fff;font-size:15px;outline:none;-webkit-appearance:none;user-select:text;-webkit-user-select:text}
#url-panel input:focus{border-color:#e50914}
#url-panel .btn-load{width:auto;padding:14px 22px;font-size:14px;border-radius:14px;flex-shrink:0}

#vol-panel{bottom:max(130px,env(safe-area-inset-bottom)+110px);transform:translateY(20px) scale(.96)}
#vol-panel.active{transform:translateY(0) scale(1)}

.sl{margin-bottom:18px}
.sl:last-child{margin-bottom:0}
.sl-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sl-label{font-size:13px;color:#777}
.sl-val{font-size:14px;color:#fff;font-weight:600;min-width:36px;text-align:right}

.range-wrap{position:relative;height:32px;display:flex;align-items:center}
.range-track{position:absolute;left:0;right:0;height:5px;background:#1e1e2e;border-radius:3px;overflow:hidden}
.range-fill{position:absolute;left:0;height:100%;background:linear-gradient(90deg,#e50914,#ff4757);border-radius:3px;width:60%;transition:width .05s}
.range-thumb{position:absolute;width:26px;height:26px;background:#e50914;border-radius:50%;box-shadow:0 2px 10px rgba(229,9,20,.4);transform:translateX(-50%);cursor:pointer;touch-action:none;transition:transform .1s,box-shadow .2s}
.range-thumb:active{transform:translateX(-50%) scale(1.15);box-shadow:0 3px 14px rgba(229,9,20,.6)}

#ctrl{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(0,0,0,.95) 0%,rgba(0,0,0,.75) 60%,transparent 100%);padding:16px 16px max(24px,env(safe-area-inset-bottom));z-index:150;transition:opacity .3s,transform .3s}

.prog-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.prog{flex:1;height:5px;background:rgba(255,255,255,.12);border-radius:3px;position:relative;cursor:pointer;touch-action:none}
.prog-buffer{position:absolute;top:0;left:0;height:100%;background:rgba(255,255,255,.06);border-radius:3px;width:0%;transition:width .3s}
.prog-fill{position:absolute;top:0;left:0;height:100%;background:#e50914;border-radius:3px;width:0%;transition:width .1s linear}
.prog-knob{position:absolute;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;background:#e50914;border-radius:50%;opacity:0;transition:opacity .2s,transform .15s;box-shadow:0 0 8px rgba(229,9,20,.4)}
.prog:active .prog-knob,.prog.drag .prog-knob{opacity:1;transform:translate(-50%,-50%) scale(1.3)}
.tm{font-size:12px;color:rgba(255,255,255,.7);min-width:100px;text-align:right;font-variant-numeric:tabular-nums}

.btns-row{display:flex;align-items:center;justify-content:space-between}
.btns-center{display:flex;align-items:center;gap:18px}

.ctrl-btn{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.1);border:none;color:#fff;display:flex;align-items:center;justify-content:center;-webkit-appearance:none;transition:.15s;touch-action:manipulation;position:relative}
.ctrl-btn:active{background:rgba(255,255,255,.2);transform:scale(.92)}
.ctrl-btn.on{background:#e50914;box-shadow:0 0 10px rgba(229,9,20,.3)}
.ctrl-btn.on:active{background:#c20811}
.ctrl-btn.big{width:64px;height:64px;background:#e50914;box-shadow:0 4px 20px rgba(229,9,20,.25)}
.ctrl-btn.big:active{background:#c20811}
.ctrl-btn svg{width:20px;height:20px;fill:currentColor}
.ctrl-btn.big svg{width:24px;height:24px}

#toast-c{position:fixed;top:max(80px,env(safe-area-inset-top)+60px);left:50%;transform:translateX(-50%);z-index:3000;display:flex;flex-direction:column;gap:8px;pointer-events:none;max-width:90vw}
.toast{background:rgba(20,20,35,.95);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);padding:12px 20px;border-radius:14px;font-size:14px;border-left:3px solid #e50914;animation:toastIn .25s;max-width:300px;text-align:center;font-weight:500;color:#fff;box-shadow:0 8px 30px rgba(0,0,0,.4)}
@keyframes toastIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

#recon{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:500;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#recon.show{display:flex}
.spin{width:40px;height:40px;border:3px solid rgba(255,255,255,.08);border-top-color:#e50914;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.ui-hidden #ctrl,.ui-hidden #badge,.ui-hidden #peers{opacity:0;pointer-events:none;transform:translateY(12px)}
.ui-hidden #ctrl{transform:translateY(20px)}

#scrub-tip{position:fixed;bottom:max(130px,env(safe-area-inset-bottom)+100px);background:rgba(0,0,0,.9);padding:6px 12px;border-radius:10px;font-size:13px;font-variant-numeric:tabular-nums;opacity:0;transition:opacity .15s;pointer-events:none;z-index:180;transform:translateX(-50%);color:#fff}
#scrub-tip.show{opacity:1}

#buffering{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:60;background:rgba(0,0,0,.4);pointer-events:none}
#buffering.show{display:flex}
.buf-spin{width:36px;height:36px;border:3px solid rgba(255,255,255,.08);border-top-color:#e50914;border-radius:50%;animation:spin 1s linear infinite}
</style>
</head>
<body>

<div id="connect">
<div class="logo">CineSync</div>
<div class="sub">Смотрите фильмы вместе</div>
<input type="text" id="un" class="inp" placeholder="Ваше имя" maxlength="20" autocomplete="off">
<input type="text" id="rc" class="inp" placeholder="Код комнаты" maxlength="6" autocomplete="off" autocapitalize="characters">
<button class="btn btn-red" id="join-btn">Присоединиться</button>
<div class="or">или</div>
<button class="btn btn-dark" id="create-btn">Создать комнату</button>
<div id="st" class="status"></div>
</div>

<div id="main" class="hidden">

<div id="vbox">
<div id="ph"><span class="ic">🎬</span><div>Нажмите 🔗 чтобы загрузить видео</div></div>
<video id="vid" playsinline preload="metadata" style="display:none"></video>
</div>

<div id="badge"><div class="dot"></div><span id="bt">Подключено</span></div>
<div id="peers"></div>

<div id="url-panel" class="panel">
<div class="row">
<input type="text" id="vu" placeholder="URL видео (MP4/WebM)..." autocomplete="off">
<button class="btn btn-red btn-load" id="load-btn">Загрузить</button>
</div>
</div>

<div id="vol-panel" class="panel">
<div class="sl" id="sl-vid">
<div class="sl-head"><span class="sl-label">Громкость фильма</span><span class="sl-val" id="vv">60%</span></div>
<div class="range-wrap" data-target="vid"><div class="range-track"><div class="range-fill" style="width:60%"></div></div><div class="range-thumb" style="left:60%"></div></div>
</div>
<div class="sl" id="sl-voice">
<div class="sl-head"><span class="sl-label">Громкость голоса</span><span class="sl-val" id="av">80%</span></div>
<div class="range-wrap" data-target="voice"><div class="range-track"><div class="range-fill" style="width:80%"></div></div><div class="range-thumb" style="left:80%"></div></div>
</div>
</div>

<div id="ctrl">
<div class="prog-row">
<div class="prog" id="prog"><div class="prog-buffer" id="pbu"></div><div class="prog-fill" id="pf"></div><div class="prog-knob" id="pk"></div></div>
<div class="tm" id="tm">00:00 / 00:00</div>
</div>
<div class="btns-row">
<div class="btns-center">
<button class="ctrl-btn" id="mb" title="Микрофон">
<svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.92V21c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.57 5.42-2.92 5.91-5.92.1-.6-.39-1.14-1-1.14z"/></svg>
</button>
<button class="ctrl-btn big" id="pb" title="Play/Pause">
<svg viewBox="0 0 24 24" id="icon-play"><path d="M8 5v14l11-7z"/></svg>
<svg viewBox="0 0 24 24" id="icon-pause" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
</button>
<button class="ctrl-btn" id="ub" title="Загрузить видео">
<svg viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
</button>
</div>
<button class="ctrl-btn" id="ab" title="Настройки звука">
<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
</button>
</div>
</div>

</div>

<div id="toast-c"></div>
<div id="scrub-tip">00:00</div>
<div id="buffering"><div class="buf-spin"></div></div>
<div id="recon"><div class="spin"></div><div style="color:#666;font-size:14px">Переподключение...</div></div>

<script>
'use strict';
const S={ws:null,pc:null,dc:null,ls:null,room:'',myName:'',isHost:false,isPlaying:false,isMicOn:false,audioCtx:null,ag:null,mg:null,syncTimer:null,reconTimer:null,reconCount:0,hideTimer:null,isDragging:false,peerAudios:new Map(),pendingVoiceVol:0.8,wakeLock:null};
const $=id=>document.getElementById(id);
const videoEl=$('vid');
const WS_URL=(location.protocol==='https:'?'wss://':'ws://')+location.host+'/ws';

function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array.from({length:6},()=>c[Math.floor(Math.random()*c.length)]).join('');}
function fmt(s){if(!isFinite(s))return'00:00';const m=Math.floor(s/60),sec=Math.floor(s%60);return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');}
function toast(msg){const c=$('toast-c');while(c.children.length>2)c.removeChild(c.firstChild);const t=document.createElement('div');t.className='toast';t.textContent=msg;c.appendChild(t);setTimeout(()=>{t.style.transition='opacity .3s';t.style.opacity='0';setTimeout(()=>t.remove(),300);},2700);}
function showStatus(t,cls){const s=$('st');s.textContent=t;s.className='status status-'+cls;s.classList.add('show');if(cls==='ok')setTimeout(()=>s.classList.remove('show'),2500);}

function closeAllPanels(){$('url-panel').classList.remove('active');$('vol-panel').classList.remove('active');}
function toggleUrlPanel(){const p=$('url-panel');const was=p.classList.contains('active');closeAllPanels();if(!was)p.classList.add('active');}
function toggleVolPanel(){const p=$('vol-panel');const was=p.classList.contains('active');closeAllPanels();if(!was)p.classList.add('active');}

function initRanges(){
document.querySelectorAll('.range-wrap').forEach(wrap=>{
const track=wrap.querySelector('.range-track'),fill=wrap.querySelector('.range-fill'),thumb=wrap.querySelector('.range-thumb'),target=wrap.dataset.target;
let dragging=false;
function setFromX(cx){const rect=track.getBoundingClientRect();let pct=Math.max(0,Math.min(1,(cx-rect.left)/rect.width));const r=Math.round(pct*100);fill.style.width=r+'%';thumb.style.left=r+'%';
if(target==='vid'){$('vv').textContent=r+'%';videoEl.volume=pct;videoEl.muted=pct===0;}
else if(target==='voice'){$('av').textContent=r+'%';S.pendingVoiceVol=pct;if(S.ag)S.ag.gain.value=pct;}}
function onDown(e){e.preventDefault();e.stopPropagation();dragging=true;wrap.classList.add('drag');setFromX(e.touches?e.touches[0].clientX:e.clientX);}
function onMove(e){if(!dragging)return;e.preventDefault();setFromX(e.touches?e.touches[0].clientX:e.clientX);}
function onUp(e){if(!dragging)return;dragging=false;wrap.classList.remove('drag');}
wrap.addEventListener('touchstart',onDown,{passive:false});
wrap.addEventListener('mousedown',onDown);
document.addEventListener('touchmove',onMove,{passive:false});
document.addEventListener('mousemove',onMove);
document.addEventListener('touchend',onUp);
document.addEventListener('mouseup',onUp);
});}

function connectWS(){if(S.ws){try{S.ws.close();}catch(e){}}S.ws=new WebSocket(WS_URL);S.ws.onopen=()=>{S.reconCount=0;$('recon').classList.remove('show');S.ws.send(JSON.stringify({type:'join',room:S.room,name:S.myName}));};S.ws.onmessage=e=>{let m;try{m=JSON.parse(e.data);}catch(err){return;}handleMsg(m);};S.ws.onclose=()=>{$('recon').classList.add('show');scheduleRecon();};S.ws.onerror=()=>showStatus('Ошибка соединения','err');}
function scheduleRecon(){if(S.reconCount>=10){$('recon').innerHTML='<div style="color:#e50914;text-align:center;padding:20px">Не удалось подключиться.<br>Перезагрузите страницу.</div>';return;}S.reconCount++;const d=Math.min(1000*Math.pow(1.5,S.reconCount-1),30000);S.reconTimer=setTimeout(()=>{connectWS();cleanupRTC();},d);}

function handleMsg(m){switch(m.type){case'joined':$('connect').classList.add('hidden');$('main').classList.remove('hidden');showStatus('Комната '+S.room,'ok');if(m.peers)m.peers.forEach(p=>{if(p!==S.myName)addPeer(p);});if(!S.isHost&&m.peers&&m.peers.length>1)initRTC(false);toast(S.isHost?'Комната: '+S.room:'Подключено!');break;case'peer-joined':toast(m.name+' подключился');addPeer(m.name);if(S.isHost)initRTC(true);break;case'peer-left':toast(m.name+' вышел');removePeer(m.name);break;case'offer':case'answer':case'ice-candidate':handleRTC(m);break;case'sync':handleSync(m);break;}}

function addPeer(n){if(document.querySelector('.peer[data-n="'+CSS.escape(n)+'"]'))return;const el=document.createElement('div');el.className='peer';el.dataset.n=n;el.innerHTML='<span>'+esc(n)+'</span><div class="pv"><div class="pvf"></div></div>';$('peers').appendChild(el);}
function removePeer(n){const el=document.querySelector('.peer[data-n="'+CSS.escape(n)+'"]');if(el)el.remove();const a=S.peerAudios.get(n);if(a){a.pause();a.srcObject=null;S.peerAudios.delete(n);}}
function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}

async function initRTC(init){if(S.pc)return;S.pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]});if(init){S.dc=S.pc.createDataChannel('sync',{ordered:true});setupDC();}else S.pc.ondatachannel=e=>{S.dc=e.channel;setupDC();};if(!S.ls){try{S.ls=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:true,autoGainControl:false}});setupAudio();}catch(e){toast('Разрешите доступ к микрофону');}}if(S.ls)S.ls.getTracks().forEach(t=>S.pc.addTrack(t,S.ls));S.pc.ontrack=e=>{const a=new Audio();a.srcObject=e.streams[0];a.autoplay=true;a.play().catch(()=>{});};S.pc.onicecandidate=e=>{if(e.candidate&&S.ws?.readyState===1)S.ws.send(JSON.stringify({type:'ice-candidate',candidate:e.candidate}));};S.pc.onconnectionstatechange=()=>{if(S.pc.connectionState==='connected')toast('Голосовой чат активен');if(S.pc.connectionState==='failed'){toast('Соединение разорвано');cleanupRTC();}};if(init){const o=await S.pc.createOffer();await S.pc.setLocalDescription(o);S.ws.send(JSON.stringify({type:'offer',sdp:o}));}}
function setupDC(){if(!S.dc)return;if(S.syncTimer)clearInterval(S.syncTimer);S.syncTimer=setInterval(()=>{if(videoEl&&!videoEl.paused&&videoEl.readyState>=2)sendSync({type:'sync',t:videoEl.currentTime,p:true});},3000);S.dc.onmessage=e=>{try{applySync(JSON.parse(e.data));}catch(err){}};S.dc.onclose=()=>{if(S.syncTimer){clearInterval(S.syncTimer);S.syncTimer=null;}};}
function cleanupRTC(){if(S.syncTimer){clearInterval(S.syncTimer);S.syncTimer=null;}if(S.dc){try{S.dc.close();}catch(e){}S.dc=null;}if(S.pc){S.pc.getSenders().forEach(s=>{if(s.track){try{s.track.stop();}catch(e){}}});S.pc.close();S.pc=null;}S.peerAudios.forEach(a=>{a.pause();a.srcObject=null;});S.peerAudios.clear();}
function setupAudio(){if(!S.ls||S.audioCtx)return;S.audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(S.audioCtx.state==='suspended')S.audioCtx.resume().catch(()=>{});S.mg=S.audioCtx.createGain();S.mg.connect(S.audioCtx.destination);const src=S.audioCtx.createMediaStreamSource(S.ls);S.ag=S.audioCtx.createGain();S.ag.gain.value=S.pendingVoiceVol||0.8;const f=S.audioCtx.createBiquadFilter();f.type='bandpass';f.frequency.value=1000;f.Q.value=1;src.connect(f);f.connect(S.ag);S.ag.connect(S.mg);const unlk=()=>{if(S.audioCtx&&S.audioCtx.state==='suspended')S.audioCtx.resume().catch(()=>{});};document.addEventListener('click',unlk,{once:true});document.addEventListener('touchstart',unlk,{once:true});}
async function handleRTC(m){if(!S.pc)return;try{if(m.type==='offer'){await S.pc.setRemoteDescription(m.sdp);const a=await S.pc.createAnswer();await S.pc.setLocalDescription(a);S.ws.send(JSON.stringify({type:'answer',sdp:a}));}else if(m.type==='answer')await S.pc.setRemoteDescription(m.sdp);else if(m.type==='ice-candidate'&&m.candidate)await S.pc.addIceCandidate(m.candidate);}catch(e){console.error('RTC:',e);}}

function loadVideo(){const url=$('vu').value.trim();if(!url)return;videoEl.pause();videoEl.removeAttribute('src');videoEl.load();$('ph').style.display='flex';videoEl.style.display='none';$('pf').style.width='0%';$('pbu').style.width='0%';$('tm').textContent='00:00 / 00:00';videoEl.src=url;videoEl.load();videoEl.oncanplay=()=>{$('ph').style.display='none';videoEl.style.display='block';videoEl.muted=false;const vol=parseInt($('vv').textContent)/100;videoEl.volume=vol;videoEl.muted=vol===0;toast('Видео готово! Нажмите ▶️');sendSync({type:'load',url:url});};videoEl.onerror=()=>{let msg='Ошибка загрузки';if(videoEl.error){switch(videoEl.error.code){case 1:msg='Прервано';break;case 2:msg='Ошибка сети';break;case 3:msg='Формат не поддерживается';break;case 4:msg='Невозможно воспроизвести';break;}}toast(msg);};videoEl.onwaiting=()=>$('buffering').classList.add('show');videoEl.onplaying=()=>$('buffering').classList.remove('show');videoEl.oncanplaythrough=()=>$('buffering').classList.remove('show');videoEl.onprogress=()=>{if(videoEl.buffered.length>0&&videoEl.duration)$('pbu').style.width=(videoEl.buffered.end(videoEl.buffered.length-1)/videoEl.duration*100)+'%';};closeAllPanels();}

function togglePlay(){if(!videoEl.src){toast('Сначала загрузите видео');return;}if(videoEl.paused){videoEl.play().then(()=>{S.isPlaying=true;updatePlayBtn(true);sendSync({type:'play',time:videoEl.currentTime});toast('▶️ Воспроизведение');}).catch(()=>toast('Нажмите на видео для старта'));}else{videoEl.pause();S.isPlaying=false;updatePlayBtn(false);sendSync({type:'pause',time:videoEl.currentTime});toast('⏸ Пауза');}}
function updatePlayBtn(p){$('icon-play').style.display=p?'none':'block';$('icon-pause').style.display=p?'block':'none';}

function initProgress(){const bar=$('prog');let dragging=false;function setFromX(cx){if(!videoEl.duration)return;const rect=bar.getBoundingClientRect();let pct=Math.max(0,Math.min(1,(cx-rect.left)/rect.width));$('pf').style.width=(pct*100)+'%';$('pk').style.left=(pct*100)+'%';$('scrub-tip').textContent=fmt(pct*videoEl.duration);$('scrub-tip').style.left=(rect.left+pct*rect.width)+'px';return pct*videoEl.duration;}function onDown(e){e.preventDefault();e.stopPropagation();dragging=true;bar.classList.add('drag');const cx=e.touches?e.touches[0].clientX:e.clientX;setFromX(cx);$('scrub-tip').classList.add('show');}function onMove(e){if(!dragging)return;e.preventDefault();const cx=e.touches?e.touches[0].clientX:e.clientX;setFromX(cx);}function onUp(e){if(!dragging)return;dragging=false;bar.classList.remove('drag');$('scrub-tip').classList.remove('show');const cx=e.changedTouches?e.changedTouches[0].clientX:e.clientX;const t=setFromX(cx);if(t!==undefined){videoEl.currentTime=t;sendSync({type:'seek',time:t});}}bar.addEventListener('touchstart',onDown,{passive:false});bar.addEventListener('mousedown',onDown);document.addEventListener('touchmove',onMove,{passive:false});document.addEventListener('mousemove',onMove);document.addEventListener('touchend',onUp);document.addEventListener('mouseup',onUp);}

function sendSync(d){const msg=JSON.stringify(d);if(S.dc?.readyState==='open')S.dc.send(msg);else if(S.ws?.readyState===1)S.ws.send(JSON.stringify({type:'sync',...d}));}
function handleSync(m){if(m.stype)applySync({type:m.stype,time:m.time,url:m.url});else applySync(m);}
function applySync(m){if(!videoEl||videoEl.readyState<1)return;switch(m.type){case'play':videoEl.currentTime=m.time;videoEl.play().then(()=>{S.isPlaying=true;updatePlayBtn(true);}).catch(()=>{toast('Собеседник нажал Play!');updatePlayBtn(false);});break;case'pause':videoEl.pause();videoEl.currentTime=m.time;S.isPlaying=false;updatePlayBtn(false);break;case'seek':videoEl.currentTime=m.time;break;case'load':if($('vu').value!==m.url){$('vu').value=m.url;loadVideo();}break;case'sync':if(m.p&&videoEl.paused)videoEl.play().catch(()=>{});if(Math.abs(videoEl.currentTime-m.time)>.8)videoEl.currentTime=m.time;break;}}

async function toggleMic(){const b=$('mb');if(!S.ls){try{S.ls=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:true,autoGainControl:false}});setupAudio();if(S.pendingVoiceVol!==undefined&&S.ag)S.ag.gain.value=S.pendingVoiceVol;if(S.pc&&S.ws?.readyState===1)S.ls.getTracks().forEach(t=>S.pc.addTrack(t,S.ls));S.isMicOn=true;b.classList.add('on');toast('🎤 Микрофон вкл');}catch(e){toast('❌ Нет доступа');}return;}S.isMicOn=!S.isMicOn;S.ls.getAudioTracks().forEach(t=>t.enabled=S.isMicOn);b.classList.toggle('on',S.isMicOn);toast(S.isMicOn?'🎤 Микрофон вкл':'🔇 Микрофон выкл');}

function resetHide(){document.body.classList.remove('ui-hidden');clearTimeout(S.hideTimer);if(S.isPlaying&&!S.isDragging)S.hideTimer=setTimeout(()=>document.body.classList.add('ui-hidden'),4000);}
function initAutoHide(){['click','touchstart'].forEach(evt=>{document.addEventListener(evt,e=>{if(e.target.closest('.ctrl-btn')||e.target.closest('.panel')||e.target.closest('.prog')||e.target.closest('.range-wrap'))return;resetHide();},{passive:true});});}

async function reqWake(){if(!('wakeLock'in navigator))return;try{S.wakeLock=await navigator.wakeLock.request('screen');S.wakeLock.addEventListener('release',()=>{if(document.visibilityState==='visible')reqWake();});}catch(e){}}document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')reqWake();});

function startLoop(){setInterval(()=>{if(videoEl&&videoEl.duration){if(!S.isDragging){$('pf').style.width=(videoEl.currentTime/videoEl.duration*100)+'%';$('pk').style.left=(videoEl.currentTime/videoEl.duration*100)+'%';}$('tm').textContent=fmt(videoEl.currentTime)+' / '+fmt(videoEl.duration);if(videoEl.buffered.length>0){const end=videoEl.buffered.end(videoEl.buffered.length-1);$('pbu').style.width=(end/videoEl.duration*100)+'%';}}},200);}

function initEvents(){
$('join-btn').addEventListener('click',()=>{S.myName=$('un').value.trim()||'Я';S.room=$('rc').value.trim().toUpperCase();if(S.room.length!==6){toast('Код — 6 символов');return;}showStatus('Подключение...','wait');connectWS();});
$('create-btn').addEventListener('click',()=>{S.myName=$('un').value.trim()||'Я';S.room=genCode();S.isHost=true;showStatus('Создание...','wait');connectWS();});
$('un').addEventListener('keydown',e=>{if(e.key==='Enter')$('rc').focus();});
$('rc').addEventListener('keydown',e=>{if(e.key==='Enter')$('join-btn').click();});
$('vu').addEventListener('keydown',e=>{if(e.key==='Enter')loadVideo();});
$('pb').addEventListener('click',e=>{e.stopPropagation();togglePlay();});
$('mb').addEventListener('click',e=>{e.stopPropagation();toggleMic();});
$('ub').addEventListener('click',e=>{e.stopPropagation();toggleUrlPanel();});
$('ab').addEventListener('click',e=>{e.stopPropagation();toggleVolPanel();});
$('load-btn').addEventListener('click',e=>{e.stopPropagation();loadVideo();});
document.addEventListener('click',e=>{if(!e.target.closest('.panel')&&!e.target.closest('.ctrl-btn'))closeAllPanels();});
document.addEventListener('keydown',e=>{if($('main').classList.contains('hidden'))return;if(e.target.tagName==='INPUT')return;switch(e.code){case'Space':e.preventDefault();togglePlay();break;case'ArrowLeft':if(videoEl.duration){videoEl.currentTime=Math.max(0,videoEl.currentTime-10);sendSync({type:'seek',time:videoEl.currentTime});}break;case'ArrowRight':if(videoEl.duration){videoEl.currentTime=Math.min(videoEl.duration,videoEl.currentTime+10);sendSync({type:'seek',time:videoEl.currentTime});}break;case'KeyM':toggleMic();break;}});
window.addEventListener('beforeunload',()=>{if(S.syncTimer)clearInterval(S.syncTimer);if(S.reconTimer)clearTimeout(S.reconTimer);cleanupRTC();if(S.ls)S.ls.getTracks().forEach(t=>t.stop());if(S.ws)S.ws.close();});
}

function init(){videoEl.volume=0.6;initEvents();initProgress();initRanges();initAutoHide();startLoop();reqWake();console.log('CineSync v3 initialized');}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
</script>
</body>
